[pytest]
addopts = -p no:flask
pythonpath = .
markers =
    unit: fast isolated tests for services/helpers with mocks
    integration: in-process API integration tests with a test database
    equivalence: equivalence partitioning validation tests
    boundary: boundary value analysis tests
    docker: tests that specifically verify Docker setup or Docker orchestration
    api: API tests that run against the configured backend URL
    security: basic API security and input hardening tests
    smoke: critical happy-path tests
    regression: regression tests
    negative: invalid/error scenario tests
    contract: OpenAPI/contract validation tests


